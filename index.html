    --fa:#3f4f7a; --fs:#4f6f52; --ba:#bd8a2c; --bs:#6e3f5f;
    --aka-bg:rgba(181,86,47,.08); --daidai-bg:rgba(189,138,44,.08); --kihada-bg:rgba(201,166,75,.10);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    background:var(--paper); color:var(--ink);
    font-family:'Zen Kaku Gothic New',sans-serif; font-size:15px; line-height:1.55;
    background-image:radial-gradient(rgba(0,0,0,.012) 1px, transparent 1px),radial-gradient(rgba(0,0,0,.012) 1px, transparent 1px);
    background-size: 24px 24px, 24px 24px;
    background-position: 0 0, 12px 12px;
  }
  button{font-family:inherit;color:inherit;cursor:pointer;border:0;background:transparent;}
  .app{max-width:820px;margin:0 auto;min-height:100%;display:flex;flex-direction:column;}

  header.top{
    position:sticky;top:0;z-index:20;
    background:var(--card);border-bottom:1px solid var(--line);
    padding:14px 20px 14px;
  }
  header.top::before{
    content:"";position:absolute;left:0;top:0;right:0;height:5px;
    background:linear-gradient(90deg,var(--aka) 0 33%,var(--daidai) 33% 67%,var(--kihada) 67% 100%);
  }
  .head-text h1{
    font-family:'Shippori Mincho',serif;font-weight:800;font-size:22px;margin:2px 0 4px;letter-spacing:.04em;
  }
  .kicker{font-size:10px;letter-spacing:.32em;text-transform:uppercase;color:var(--terra);font-weight:700;}
  .head-meta{display:flex;flex-wrap:wrap;gap:4px 14px;font-size:12.5px;color:var(--soft);}
  .head-meta b{color:var(--ink);font-weight:700;}

  .tabs{
    display:flex;gap:0;margin:14px 20px 0;border-bottom:1px solid var(--line);
    overflow-x:auto;
  }
  .tab{
    padding:10px 16px;font-size:13px;font-weight:700;color:var(--soft);
    border-bottom:2px solid transparent;white-space:nowrap;
    transition:all .15s ease;
  }
  .tab.active{color:var(--ink);border-bottom-color:var(--terra);}
  .tab .c{font-size:11px;color:var(--soft);margin-left:4px;}
  .tab.active .c{color:var(--terra);}

  main{flex:1;padding:18px 20px 96px;}
  .cards{display:flex;flex-direction:column;gap:14px;}

  .card{
    background:var(--card);border:1px solid var(--line);
    border-left-width:5px;border-radius:10px;
    padding:16px 18px;position:relative;
    transition:transform .18s ease, opacity .25s ease, box-shadow .18s ease;
    box-shadow:0 1px 0 rgba(0,0,0,.02);
  }
  .card:hover{box-shadow:0 4px 12px rgba(0,0,0,.04);}
  .card.aka{border-left-color:var(--aka);}
  .card.daidai{border-left-color:var(--daidai);}
  .card.kihada{border-left-color:var(--kihada);}

  .session-head{
    display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;
    padding-bottom:10px;margin-bottom:10px;
    border-bottom:1px solid var(--line);
  }
  .session-name{
    font-family:'Shippori Mincho',serif;font-weight:800;font-size:18px;
    color:var(--terra);letter-spacing:.02em;
    text-decoration:none;
  }
  .session-name:hover{text-decoration:underline;text-decoration-color:var(--terra);text-underline-offset:3px;}
  .session-id{font-family:'Shippori Mincho',serif;font-size:12px;font-weight:700;color:var(--soft);letter-spacing:.06em;}

  .card-head{display:flex;align-items:flex-start;gap:10px;flex-wrap:wrap;}

  .badge-id{font-family:'Shippori Mincho',serif;font-size:11px;font-weight:700;
    color:var(--soft);letter-spacing:.06em;}
  .badge-prio{font-size:11px;font-weight:700;padding:2px 8px;border-radius:4px;}
  .card.aka .badge-prio{background:var(--aka-bg);color:var(--aka);}
  .card.daidai .badge-prio{background:var(--daidai-bg);color:var(--daidai);}
  .card.kihada .badge-prio{background:var(--kihada-bg);color:var(--kihada);}
  .badge-proj{font-size:10.5px;color:var(--soft);padding:2px 7px;}

  .dates{margin-left:auto;text-align:right;display:flex;flex-direction:column;gap:2px;font-size:10.5px;color:var(--soft);line-height:1.3;}
  .dates .lab{font-size:9px;letter-spacing:.18em;color:var(--soft);text-transform:uppercase;}
  .dates .d{font-family:'Shippori Mincho',serif;font-weight:700;font-size:13px;color:var(--ink);letter-spacing:0;}

  .souki{
    font-family:'Shippori Mincho',serif;font-weight:700;font-size:17px;line-height:1.4;
    color:var(--ink);margin:12px 0 6px;letter-spacing:.01em;
  }
  .ima-tomatte{
    font-size:13px;color:var(--soft);line-height:1.55;
    border-left:2px solid var(--line);padding-left:10px;margin:8px 0 12px;
  }

  .meta-grid{
    display:grid;grid-template-columns:repeat(auto-fit, minmax(180px, 1fr));
    gap:8px 14px;
    background:var(--paper);border-radius:8px;padding:10px 12px;
    margin:8px 0 12px;font-size:11.5px;color:var(--soft);
  }
  .meta-grid .k{font-weight:700;color:var(--ink);font-size:10.5px;display:block;letter-spacing:.06em;margin-bottom:1px;text-transform:uppercase;}
  .meta-grid .v{font-size:12px;color:var(--ink);}
  .nou-pill{display:inline-block;font-size:10px;padding:1px 6px;border-radius:4px;margin-right:3px;background:#fff;border:1px solid var(--line);}
  .assignee-pill{display:inline-block;font-size:10.5px;padding:2px 8px;border-radius:4px;font-weight:700;}
  .a-fa{background:rgba(63,79,122,.15);color:var(--fa);}
  .a-fs{background:rgba(79,111,82,.15);color:var(--fs);}
  .a-ba{background:rgba(189,138,44,.15);color:var(--ba);}
  .a-bs{background:rgba(110,63,95,.15);color:var(--bs);}
  .a-mits{background:rgba(181,86,47,.15);color:var(--aka);}
  .mode-pill{display:inline-block;font-size:10px;padding:1px 6px;border-radius:4px;}
  .mode-mock{background:rgba(110,63,95,.15);color:var(--murasaki);font-weight:700;}

  .kimeru-label{
    font-size:10.5px;letter-spacing:.22em;color:var(--terra);font-weight:700;margin-bottom:6px;
    text-transform:uppercase;
  }
  .kimeru-text{font-size:13.5px;color:var(--ink);margin-bottom:10px;line-height:1.5;}
  .kimeru-btns{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px;}
  .btn{
    padding:8px 14px;border:1.5px solid var(--line);border-radius:8px;
    background:var(--paper);font-weight:700;font-size:13px;color:var(--ink);
    transition:all .15s ease;
  }
  .btn:hover{border-color:var(--ink);background:#fff;}
  .btn.go-a{border-color:var(--terra);color:var(--terra);}
  .btn.go-a:hover{background:var(--terra);color:#fff;}
  .btn.go-b{border-color:var(--green);color:var(--green);}
  .btn.go-b:hover{background:var(--green);color:#fff;}
  .btn.go-c{border-color:var(--kon);color:var(--kon);}
  .btn.go-c:hover{background:var(--kon);color:#fff;}

    padding-top:10px;border-top:1px dashed var(--line);

    display:flex;justify-content:space-between;align-items:center;
    margin-top:10px;padding-top:10px;border-top:1px solid var(--line);
    font-size:11.5px;color:var(--soft);
  }

    display:inline-flex;align-items:center;gap:5px;
    color:var(--terra);text-decoration:none;font-weight:700;
    background:rgba(181,86,47,.08);padding:5px 11px;border-radius:999px;
    transition:all .15s ease;
  }
  .chat-link:hover{background:var(--terra);color:#fff;}

  .card.done{opacity:0;transform:scale(.96) translateY(-8px);pointer-events:none;}

  .celebrate{
    position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);
    font-family:'Shippori Mincho',serif;font-size:42px;font-weight:800;
    color:var(--terra);pointer-events:none;opacity:0;
    text-shadow:0 4px 24px rgba(0,0,0,.15);z-index:100;
  }
  .celebrate.show{animation:cel 1.2s ease-out forwards;}
  @keyframes cel{
    0%{opacity:0;transform:translate(-50%,-50%) scale(.5);}
    20%{opacity:1;transform:translate(-50%,-50%) scale(1.1);}
    100%{opacity:0;transform:translate(-50%,-50%) scale(1.4) translateY(-40px);}

  .group-h{
    font-family:'Shippori Mincho',serif;font-weight:700;font-size:15px;

    main{padding:14px 14px 96px;}
    header.top{padding:12px 14px 12px;}
    .tabs{margin:12px 14px 0;}
    .souki{font-size:15.5px;}

const groupTitle = {aka: "🔴 主要動線が止まっている", daidai: "🟠 後続が詰まっている", kihada: "🟡 改善が止まっている"};

function render(filter='all'){
  const host = document.getElementById('cards-host');
  host.innerHTML = '';
  const groups = ['aka','daidai','kihada'];
  groups.forEach(g=>{
    let items = data.filter(d=>d.w===g);
    if(filter!=='all'){
      if(filter==='aka'||filter==='daidai'||filter==='kihada'){ if(filter!==g) return; }
      else if(filter==='P0'||filter==='P1'||filter==='P2'||filter==='P3'){ items = items.filter(d=>d.prio===filter); }
      else if(filter==='FA'){ items = items.filter(d=>d.asg.includes('FA')||d.asg.includes('persona-reviewer')); }
      else if(filter==='BA'){ items = items.filter(d=>d.asg.includes('BA')||d.asg.includes('strategist')); }
      else if(filter==='writer'){ items = items.filter(d=>d.asg.includes('writer')); }
      else if(filter==='engineer'){ items = items.filter(d=>d.asg.includes('engineer')); }
    }
    if(items.length===0) return;
    items.sort((a,b)=> a.kosin < b.kosin ? -1 : a.kosin > b.kosin ? 1 : 0); // 最終更新日 古い順
    const sec = document.createElement('div');
    sec.className = 'group';
    sec.innerHTML = `<div class="group-h"><span class="em">${groupTitle[g].slice(0,2)}</span>${groupTitle[g].slice(2)}</div>`;
    const grid = document.createElement('div');
    grid.className = 'cards';
    items.forEach(d=>{
      const card = document.createElement('article');
      card.className = `card ${d.w}`;
      const btnsHTML = d.btns.map(b=>`<button class="btn ${b.c}" onclick="done(this)">${b.l}</button>`).join('');
      const chatHTML = d.url
        ? `<a class="chat-link" href="${d.url}" target="_blank">▶ ${d.chat}</a>`
        : `<span style="font-size:11px;color:var(--soft);">${d.chat}</span>`;
      const nouHTML = d.nou.map(n=>`<span class="nou-pill">${n}</span>`).join('');
      const modePillHTML = d.mode === '🧪自走モック' ? `<span class="mode-pill mode-mock">${d.mode}</span>` : '';
      const sessionNameHTML = d.url
        ? `<a class="session-name" href="${d.url}" target="_blank">${d.chat}</a>`
        : `<span class="session-name" style="color:var(--soft);">${d.chat}</span>`;
      card.innerHTML = `
        <div class="session-head">
          ${sessionNameHTML}
          <span class="session-id">ID:${d.id}</span>
        </div>
        <div class="card-head">
          <span class="badge-prio">${d.prio}</span>
          <span class="badge-proj">${d.proj}</span>
          ${d.star ? `<span style="font-size:10.5px;color:var(--terra);font-weight:700;">${d.star}</span>` : ''}
          ${modePillHTML}
          <div class="dates">
            <div><span class="lab">発生</span> <span class="d">${d.hassei}</span></div>
            <div><span class="lab">最終更新</span> <span class="d">${d.kosin}</span></div>
          </div>
        </div>
        <div class="souki">${d.souki}</div>
        <div class="ima-tomatte">${d.ima}</div>
        <div class="meta-grid">
          <div><span class="k">担当</span><span class="v"><span class="assignee-pill ${d.asgClass}">${d.asg}</span></span></div>
          <div><span class="k">実行主体</span><span class="v">${d.shutai}</span></div>
          <div><span class="k">脳</span><span class="v">${nouHTML}</span></div>
          <div><span class="k">上流</span><span class="v">${d.joryu}</span></div>
          <div><span class="k">戦略</span><span class="v">${d.senryaku}</span></div>
        </div>
        <div class="kimeru-label">Mits が 決 め る</div>
        <div class="kimeru-text">${d.kimeru}</div>
        <div class="kimeru-btns">${btnsHTML}</div>
        <div class="kimattara">決まったら：${d.kimattara}</div>
        <div class="footer-row">
          <span>該当チャット</span>
          ${chatHTML}
        </div>
      `;
      grid.appendChild(card);
    });
    sec.appendChild(grid);
    host.appendChild(sec);
  });
}

function done(btn){
  const card = btn.closest('.card');
  card.classList.add('done');
  showCelebrate();
  setTimeout(()=>{card.remove();}, 350);
}
function showCelebrate(){
  const el = document.getElementById('celebrate');
  const msgs = ['消化','一件落着','ありがとう','お見事','進んだ'];
  el.textContent = msgs[Math.floor(Math.random()*msgs.length)];
  el.classList.remove('show');
  void el.offsetWidth;
  el.classList.add('show');
}
document.querySelectorAll('.tab').forEach(t=>{
  t.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
    t.classList.add('active');
    render(t.dataset.filter);
  });
});
render('all');
</script>
